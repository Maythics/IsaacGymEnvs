name: XHandPush

physics_engine: ${..physics_engine}

env:
  numEnvs: ${resolve_default:8192,${...num_envs}}
  envSpacing: 0.75
  episodeLength: 200
  enableDebugVis: False
  aggregateMode: 1

  clipObservations: 5.0
  clipActions: 1.0

  stiffnessScale: 1.0
  forceLimitScale: 1.0

  useRelativeControl: False
  dofSpeedScale: 20.0
  actionsMovingAverage: 1.0
  controlFrequencyInv: 1 # 60 Hz

  startPositionNoise: 0.01
  startRotationNoise: 0.0

  resetPositionNoise: 0.01
  resetRotationNoise: 0.0
  resetDofPosRandomInterval: 0.2
  resetDofVelRandomInterval: 0.0

  # Random forces applied to the object
  forceScale: 0.0
  forceProbRange: [0.001, 0.1]
  forceDecay: 0.99
  forceDecayInterval: 0.08

  # Shared reward params (distRewardScale active; rotRewardScale disabled)
  distRewardScale: -10.0
  rotRewardScale: 0.0
  rotEps: 0.1
  actionPenaltyScale: -0.0002
  reachGoalBonus: 300
  fallDistance: 0.24
  fallPenalty: 0.0

  # Quasi-static manipulation penalties
  objLinvelPenaltyScale: -0.01
  objAngvelPenaltyScale: -0.005
  dofVelPenaltyScale: -0.001
  palmDistPenaltyScale: -0.5

  # Push-specific: yaw alignment reward
  yawRewardScale: 1.0
  yawEps: 0.1

  # Push-specific: success conditions
  successTolerance: 0.1
  posSuccessTolerance: 0.02
  yawSuccessTolerance: 1.6

  # Push-specific: goal sampling
  targetPosRangeXY: 0.02
  targetPosRangeZ: 0.03

  # Push-specific: anti-flip
  uprightPenaltyScale: -0.5
  flipAngle: 1.5708

  # Trajectory mode
  pushStepSize: 0.01

  objectType: "block"
  objectTypePool: []
  objectScaleRanges:
    block: [1, 1]
    default: [0.8, 1.2]
  observationType: "full_state"
  asymmetric_observations: False
  printNumSuccesses: False
  maxConsecutiveSuccesses: 0

  asset:
    assetFileNameBlock: "urdf/objects/cube_multicolor.urdf"
    assetFileNameEgg: "mjcf/open_ai_assets/hand/egg.xml"
    assetFileNamePen: "mjcf/open_ai_assets/hand/pen.xml"

  enableCameraSensors: False

task:
  randomize: False
  randomization_params:
    frequency: 720
    observations:
      range: [0, .002]
      range_correlated: [0, .001]
      operation: "additive"
      distribution: "gaussian"
    actions:
      range: [0., .05]
      range_correlated: [0, .015]
      operation: "additive"
      distribution: "gaussian"
    sim_params:
      gravity:
        range: [0, 0.4]
        operation: "additive"
        distribution: "gaussian"
    actor_params:
      hand:
        color: True
        dof_properties:
          damping:
            range: [0.3, 3.0]
            operation: "scaling"
            distribution: "loguniform"
          stiffness:
            range: [0.75, 1.5]
            operation: "scaling"
            distribution: "loguniform"
          lower:
            range: [0, 0.01]
            operation: "additive"
            distribution: "gaussian"
          upper:
            range: [0, 0.01]
            operation: "additive"
            distribution: "gaussian"
        rigid_body_properties:
          mass:
            range: [0.5, 1.5]
            operation: "scaling"
            distribution: "uniform"
            setup_only: True
        rigid_shape_properties:
          friction:
            num_buckets: 250
            range: [0.7, 1.3]
            operation: "scaling"
            distribution: "uniform"
      object:
        rigid_body_properties:
          mass:
            range: [0.5, 1.5]
            operation: "scaling"
            distribution: "uniform"
            setup_only: True
        rigid_shape_properties:
          friction:
            num_buckets: 250
            range: [0.7, 1.3]
            operation: "scaling"
            distribution: "uniform"

sim:
  dt: 0.01667 # 1/60
  substeps: 2
  up_axis: "z"
  use_gpu_pipeline: ${eq:${...pipeline},"gpu"}
  gravity: [0.0, 0.0, -9.81]
  physx:
    num_threads: ${....num_threads}
    solver_type: ${....solver_type}
    use_gpu: ${contains:"cuda",${....sim_device}}
    num_position_iterations: 8
    num_velocity_iterations: 0
    max_gpu_contact_pairs: 8388608
    num_subscenes: ${....num_subscenes}
    contact_offset: 0.002
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 1000.0
    default_buffer_size_multiplier: 5.0
    contact_collection: 0
