# used to create the object
name: ShadowStableGrasp

physics_engine: ${..physics_engine}

# if given, will override the device setting in gym.
env:
  numEnvs: ${resolve_default:16384,${...num_envs}}
  envSpacing: 0.75
  episodeLength: 100
  enableDebugVis: False
  aggregateMode: 1

  clipObservations: 5.0
  clipActions: 1.0

  stiffnessScale: 1.0
  forceLimitScale: 1.0

  useRelativeControl: False
  dofSpeedScale: 20.0
  actionsMovingAverage: 1.0
  controlFrequencyInv: 1 # 60 Hz

  startPositionNoise: 0.01
  startRotationNoise: 0.0

  resetPositionNoise: 0.01
  resetRotationNoise: 0.0
  resetDofPosRandomInterval: 0.2
  resetDofVelRandomInterval: 0.0

  # Random forces applied to the object
  forceScale: 0.0
  forceProbRange: [0.001, 0.1]
  forceDecay: 0.99
  forceDecayInterval: 0.08

  # Stable grasp reward parameters
  stableGraspScale: 5.0        # exp decay rate for relative velocity reward
  contactRewardScale: 0.001    # small bonus per active fingertip contact
  palmDistPenaltyScale: -1.0   # keep object near palm (negative = penalty)
  actionPenaltyScale: -0.0002
  fallDistance: 0.3            # palm-to-object distance threshold for episode failure

  # Initial hand orientation randomization
  maxInitOrientationDeg: 60    # max axis-angle deviation from default pose (degrees)

  # Object types
  objectType: "block"          # can be block, egg, pen, or ycb_*
  objectTypePool: []           # empty = single-type; set to list for multi-object training
  objectScaleRanges:
    block: [1, 1]
    egg: [0.6, 1.4]
    pen: [0.6, 1.2]
    default: [0.8, 1.2]        # applied to all ycb_* types

  observationType: "full_state"
  asymmetric_observations: False

  # Goal-related params (unused in this task, set to neutral values)
  distRewardScale: 0.0
  rotRewardScale: 0.0
  rotEps: 0.1
  reachGoalBonus: 0
  fallPenalty: 0.0
  successTolerance: 0.1
  printNumSuccesses: False
  maxConsecutiveSuccesses: 0

  # Quasi-static penalties: penalize object motion, hand shaking, and high torques
  objLinvelPenaltyScale: -0.05   # penalize object linear velocity (L2 squared)
  objAngvelPenaltyScale: -0.02   # penalize object angular velocity (L2 squared)
  dofVelPenaltyScale: -0.001     # suppress fast joint motion (hand shaking)
  dofForcePenaltyScale: -0.0002  # reduce unnecessary joint torques

  asset:
    assetFileName: "mjcf/open_ai_assets/hand/shadow_hand.xml"
    assetFileNameBlock: "urdf/objects/cube_multicolor.urdf"
    assetFileNameEgg: "mjcf/open_ai_assets/hand/egg.xml"
    assetFileNamePen: "mjcf/open_ai_assets/hand/pen.xml"

  # set to True if you use camera sensors in the environment
  enableCameraSensors: False

task:
  randomize: False
  randomization_params:
    frequency: 720
    observations:
      range: [0, .002]
      range_correlated: [0, .001]
      operation: "additive"
      distribution: "gaussian"
    actions:
      range: [0., .05]
      range_correlated: [0, .015]
      operation: "additive"
      distribution: "gaussian"
    sim_params:
      gravity:
        range: [0, 0.4]
        operation: "additive"
        distribution: "gaussian"
    actor_params:
      hand:
        color: True
        tendon_properties:
          damping:
            range: [0.3, 3.0]
            operation: "scaling"
            distribution: "loguniform"
          stiffness:
            range: [0.75, 1.5]
            operation: "scaling"
            distribution: "loguniform"
        dof_properties:
          damping:
            range: [0.3, 3.0]
            operation: "scaling"
            distribution: "loguniform"
          stiffness:
            range: [0.75, 1.5]
            operation: "scaling"
            distribution: "loguniform"
          lower:
            range: [0, 0.01]
            operation: "additive"
            distribution: "gaussian"
          upper:
            range: [0, 0.01]
            operation: "additive"
            distribution: "gaussian"
        rigid_body_properties:
          mass:
            range: [0.5, 1.5]
            operation: "scaling"
            distribution: "uniform"
            setup_only: True
        rigid_shape_properties:
          friction:
            num_buckets: 250
            range: [0.7, 1.3]
            operation: "scaling"
            distribution: "uniform"
      object:
        rigid_body_properties:
          mass:
            range: [0.5, 1.5]
            operation: "scaling"
            distribution: "uniform"
            setup_only: True
        rigid_shape_properties:
          friction:
            num_buckets: 250
            range: [0.7, 1.3]
            operation: "scaling"
            distribution: "uniform"

sim:
  dt: 0.01667 # 1/60
  substeps: 2
  up_axis: "z"
  use_gpu_pipeline: ${eq:${...pipeline},"gpu"}
  gravity: [0.0, 0.0, -9.81]
  physx:
    num_threads: ${....num_threads}
    solver_type: ${....solver_type}
    use_gpu: ${contains:"cuda",${....sim_device}}
    num_position_iterations: 8
    num_velocity_iterations: 0
    max_gpu_contact_pairs: 8388608 # 8*1024*1024
    num_subscenes: ${....num_subscenes}
    contact_offset: 0.002
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 1000.0
    default_buffer_size_multiplier: 5.0
    contact_collection: 0
